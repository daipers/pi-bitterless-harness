name: ship

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  ship-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: Install pi
        run: npm install -g @mariozechner/pi-coding-agent@$(cat PI_VERSION)

      - name: Install Python tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Verify version and changelog
        run: |
          version="$(cat VERSION)"
          grep -q "## ${version}" CHANGELOG.md

      - name: Verify supported runtimes
        run: starter/bin/check-supported-runtime.sh

      - name: Run preflight
        env:
          PYTHONPATH: ${{ github.workspace }}/starter/bin
        run: starter/bin/preflight.sh

      - name: Build release artifacts
        run: starter/bin/build-release-artifacts.sh

  main-real-pi-evidence:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ship-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pi
        run: npm install -g @mariozechner/pi-coding-agent@$(cat PI_VERSION)

      - name: Install Python tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt

      - name: Materialize pi auth
        env:
          PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
        run: |
          if [[ -z "${PI_AUTH_JSON}" ]]; then
            echo "missing required PI_AUTH_JSON secret" >&2
            exit 1
          fi
          auth_path="$RUNNER_TEMP/pi-auth.json"
          printf '%s' "${PI_AUTH_JSON}" > "$auth_path"
          chmod 600 "$auth_path"
          echo "HARNESS_PI_AUTH_JSON=$auth_path" >> "$GITHUB_ENV"

      - name: Verify supported runtimes
        run: starter/bin/check-supported-runtime.sh

      - name: Run real pi integration tests
        env:
          HARNESS_RUN_REAL_PI_TESTS: "1"
          HARNESS_REAL_PI_MODEL: ${{ vars.PI_MODEL }}
          PYTHONPATH: ${{ github.workspace }}/starter/bin
        run: python3 -m pytest tests/test_real_pi_integration.py -q

      - name: Run main-branch real pi canary
        env:
          HARNESS_REAL_PI_MODEL: ${{ vars.PI_MODEL }}
          HARNESS_REAL_CANARY_SUMMARY_PATH: ${{ runner.temp }}/real-pi-canary.summary.json
        run: python3 starter/bin/run_real_canary.py

      - name: Verify main-branch evidence summary
        run: |
          python3 starter/bin/verify_release_evidence.py \
            --summary-glob "${{ runner.temp }}/real-pi-canary.summary.json" \
            --min-runs 1 \
            --freshness-hours 36

      - name: Upload main-branch evidence summary
        uses: actions/upload-artifact@v4
        with:
          name: main-real-pi-evidence-summary
          path: ${{ runner.temp }}/real-pi-canary.summary.json

  tag-evidence-gate:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: ship-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Python tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt

      - name: Verify recent canary history
        run: |
          python3 starter/bin/verify_release_evidence.py \
            --github-repo "${{ github.repository }}" \
            --github-token "${{ github.token }}" \
            --workflow-file real-pi-canary.yml \
            --branch main \
            --artifact-name real-pi-canary-summary \
            --min-runs 2 \
            --freshness-hours 36
